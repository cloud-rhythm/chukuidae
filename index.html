<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="축의대 계산기">
<meta name="theme-color" content="#2D6A5F">
<link rel="manifest" href="/chukuidae/manifest.json">
<title>축의대 계산기</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;500;700;900&display=swap');
  * { box-sizing: border-box; margin: 0; padding: 0; }
  :root {
    --bg: #F7F4F0; --white: #fff; --accent: #2D6A5F;
    --text: #1A1A1A; --sub: #999; --border: #E4DDD5;
    --green: #2A7A4F; --orange: #D4630A;
  }
  html, body { font-family: 'Noto Sans KR', sans-serif; background: var(--bg); color: var(--text); height: 100%; overflow: hidden; }
  .app { display: flex; flex-direction: column; height: 100dvh; padding-bottom: env(safe-area-inset-bottom); }

  /* 헤더 */
  .header { background: var(--accent); color: white; display: flex; align-items: flex-end; padding: 0 28px 10px; height: 50px; flex-shrink: 0; gap: 24px; }
  .header h1 { font-size: 21px; font-weight: 900; white-space: nowrap; }
  .stats { display: flex; flex: 1; height: 100%; overflow-x: auto; }
  .stat-item { display: flex; align-items: flex-end; gap: 8px; padding: 0 28px; border-left: 1px solid rgba(255,255,255,0.3); flex-shrink: 0; white-space: nowrap; }
  .stat-label { font-size: 17px; opacity: 0.95; font-weight: 700; white-space: nowrap; }
  .stat-value { font-size: 19px; font-weight: 900; }

  /* 헤더 재고 컨트롤 */
  #mealStockItem, #giftStockItem { flex: 0 0 260px; gap: 6px; }
  #mealStockItem input, #giftStockItem input {
    width: 64px; font-family: 'Noto Sans KR', sans-serif; font-size: 13px; font-weight: 700;
    border: none; border-bottom: 2px solid rgba(255,255,255,0.5); background: transparent;
    color: white; text-align: center; outline: none; padding: 2px 4px;
  }
  #mealStockItem input::placeholder, #giftStockItem input::placeholder { color: rgba(255,255,255,0.5); }
  #mealStockItem input:focus, #giftStockItem input:focus { border-bottom-color: white; }
  #mealStockItem button, #giftStockItem button {
    font-family: 'Noto Sans KR', sans-serif; font-size: 11px; font-weight: 700;
    border: 1.5px solid rgba(255,255,255,0.6); border-radius: 5px;
    background: transparent; color: white; cursor: pointer; padding: 3px 9px; white-space: nowrap;
  }
  #mealStockItem button:hover, #giftStockItem button:hover { background: rgba(255,255,255,0.2); }
  .stock-val { font-size: 15px; font-weight: 900; }

  /* 바디 */
  .body { display: flex; flex: 1; overflow: hidden; }

  /* 왼쪽 패널 */
  .panel-left { width: 50%; background: var(--white); border-right: 2px solid var(--border); display: flex; flex-direction: column; padding: 22px 28px; gap: 18px; overflow-y: auto; }
  .sec-label { font-size: 15px; font-weight: 400; color: var(--text); letter-spacing: -0.3px; margin-bottom: 10px; }

  /* 재고 */
  .stock-panel { background: var(--bg); border: 2px solid var(--border); border-radius: 10px; padding: 12px 14px; display: flex; gap: 0; }
  .stock-half { flex: 1; display: flex; align-items: center; gap: 7px; }
  .stock-half:first-child { padding-right: 14px; border-right: 1px solid var(--border); margin-right: 14px; }
  .stock-lbl { font-size: 12px; font-weight: 700; color: var(--sub); white-space: nowrap; }
  .stock-inp { width: 68px; font-family: 'Noto Sans KR', sans-serif; font-size: 14px; font-weight: 700; border: 2px solid var(--border); border-radius: 7px; padding: 7px 8px; background: var(--white); color: var(--text); text-align: center; outline: none; }
  .stock-inp:focus { border-color: var(--accent); }
  .stock-inp:disabled { background: var(--bg); color: var(--sub); }
  .btn-confirm { padding: 7px 12px; border: 2px solid var(--green); border-radius: 7px; background: none; color: var(--green); font-family: 'Noto Sans KR', sans-serif; font-size: 12px; font-weight: 700; cursor: pointer; white-space: nowrap; }
  .btn-confirm:hover { background: var(--green); color: white; }
  .btn-add { padding: 7px 10px; border: 2px solid var(--border); border-radius: 7px; background: none; color: var(--sub); font-family: 'Noto Sans KR', sans-serif; font-size: 12px; font-weight: 700; cursor: pointer; white-space: nowrap; display: none; }
  .btn-add:hover { border-color: var(--accent); color: var(--accent); }
  .add-inp { width: 58px; font-family: 'Noto Sans KR', sans-serif; font-size: 13px; font-weight: 700; border: 2px solid var(--border); border-radius: 7px; padding: 6px 6px; background: var(--white); color: var(--text); text-align: center; outline: none; display: none; }
  .add-inp:focus { border-color: var(--green); }
  .stock-remain { font-size: 12px; font-weight: 700; white-space: nowrap; color: var(--sub); margin-left: auto; }
  .stock-remain.ok { color: var(--green); }
  .stock-remain.warn { color: var(--orange); }
  .stock-remain.empty { color: var(--accent); }

  /* 이름/금액 */
  .input-row { display: flex; gap: 10px; }
  input[type="number"]::-webkit-inner-spin-button,
  input[type="number"]::-webkit-outer-spin-button { -webkit-appearance: none; margin: 0; }
  input[type="number"] { -moz-appearance: textfield; }
  
  .panel-left input[type="text"], .panel-left input[type="number"],
  .modal-box input[type="text"], .modal-box input[type="number"] {
    font-family: 'Noto Sans KR', sans-serif; font-size: 16px; font-weight: 500; border: 2px solid var(--border);
    border-radius: 10px; padding: 14px 16px; background: var(--bg); color: var(--text);
    outline: none; width: 100%;
  }
  .panel-left input[type="text"]:focus, .panel-left input[type="number"]:focus,
  .modal-box input[type="text"]:focus, .modal-box input[type="number"]:focus { border-color: var(--accent); }

  /* 금액 버튼 */
  .amount-grid { display: grid; grid-template-columns: repeat(6, 1fr); gap: 10px; }
  .qbtn { padding: 14px 0; border: 2px solid var(--border); border-radius: 8px; background: var(--bg); font-family: 'Noto Sans KR', sans-serif; font-size: 15px; font-weight: 700; cursor: pointer; color: var(--text); text-align: center; }
  .qbtn:hover { border-color: var(--accent); color: var(--accent); }
  .qbtn.on { background: var(--accent); border-color: var(--accent); color: white; }

  /* 식권/답례품 카운터 */
  .counter-section { display: flex; flex-direction: column; gap: 10px; }
  .counter-row { display: flex; align-items: center; gap: 8px; background: var(--bg); border: 2px solid var(--border); border-radius: 12px; padding: 10px 14px; }
  .counter-lbl { font-size: 15px; font-weight: 700; width: 64px; flex-shrink: 0; color: var(--sub); }
  .cbtn { width: 44px; height: 44px; border: 2px solid var(--border); border-radius: 8px; background: var(--bg); font-family: 'Noto Sans KR', sans-serif; font-size: 15px; font-weight: 700; cursor: pointer; color: var(--text); flex-shrink: 0; }
  .cbtn.on { background: var(--green); border-color: var(--green); color: white; }
  .cbtn.zero-on { background: var(--sub); border-color: var(--sub); color: white; }
  .custom-inp { width: 80px; height: 52px; border: 2px solid var(--border); border-radius: 8px; padding: 0 8px; font-family: 'Noto Sans KR', sans-serif; font-size: 13px; font-weight: 700; background: var(--bg); color: var(--text); text-align: center; outline: none; }
  .custom-inp:focus { border-color: var(--green); }

  /* 등록 버튼 */
  .add-btn { width: 100%; padding: 16px; background: var(--accent); color: white; border: none; border-radius: 10px; font-family: 'Noto Sans KR', sans-serif; font-size: 17px; font-weight: 900; cursor: pointer; letter-spacing: -0.3px; }
  .add-btn:hover { background: #235249; }

  /* 오른쪽 패널 */
  .panel-right { width: 50%; display: flex; flex-direction: column; overflow: hidden; }
  .list-header { display: flex; align-items: center; padding: 16px 22px; border-bottom: 1px solid var(--border); background: var(--white); flex-shrink: 0; gap: 12px; }
  .list-title { font-size: 15px; font-weight: 400; color: var(--text); white-space: nowrap; }
  .search-inp { font-family: 'Noto Sans KR', sans-serif; font-size: 14px; font-weight: 500; border: 2px solid var(--border); border-radius: 8px; padding: 8px 14px; background: var(--bg); color: var(--text); outline: none; width: 180px; }
  .search-inp:focus { border-color: var(--accent); }
  .excel-btn { font-size: 13px; font-weight: 700; border: 2px solid var(--green); border-radius: 6px; cursor: pointer; font-family: 'Noto Sans KR', sans-serif; padding: 8px 14px; color: var(--green); background: none; white-space: nowrap; }
  .excel-btn:hover { background: var(--green); color: white; }

  /* 목록 */
  .guest-list { flex: 1; overflow-y: auto; padding: 12px 16px; }
  .empty-state { text-align: center; padding: 60px 20px; color: var(--sub); font-size: 15px; }
  .empty-icon { font-size: 36px; margin-bottom: 10px; }
  .guest-card { background: var(--white); border-radius: 10px; padding: 14px 16px; margin-bottom: 8px; display: flex; align-items: center; gap: 12px; border: 1px solid var(--border); animation: fadeIn 0.15s ease; }
  @keyframes fadeIn { from { opacity: 0; transform: translateY(-5px); } to { opacity: 1; transform: translateY(0); } }
  .guest-num { width: 28px; height: 28px; border-radius: 50%; background: var(--bg); display: flex; align-items: center; justify-content: center; font-size: 12px; font-weight: 700; color: var(--sub); flex-shrink: 0; }
  .guest-info { flex: 1; min-width: 0; }
  .guest-name { font-size: 17px; font-weight: 700; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .guest-meta { display: flex; gap: 6px; margin-top: 4px; align-items: center; flex-wrap: wrap; }
  .guest-amount { font-size: 14px; color: var(--accent); font-weight: 700; }
  .badge { font-size: 12px; padding: 3px 10px; border-radius: 8px; font-weight: 700; }
  .badge-meal { background: #EAF5EE; color: var(--green); }
  .badge-meal-none { background: #F0F0F0; color: var(--sub); }
  .badge-gift { background: #FFF0E6; color: var(--orange); }
  .card-btns { display: flex; gap: 5px; flex-shrink: 0; }
  .icon-btn { width: 34px; height: 34px; border-radius: 8px; border: none; font-size: 15px; cursor: pointer; display: flex; align-items: center; justify-content: center; }
  .edit-btn { background: #EEF2FF; color: #3A6FD8; }
  .edit-btn:hover { background: #3A6FD8; color: white; }
  .del-btn { background: #FEF0EE; color: var(--accent); }
  .del-btn:hover { background: var(--accent); color: white; }

  /* 모달 */
  .modal-overlay { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.4); z-index: 200; align-items: center; justify-content: center; }
  .modal-overlay.open { display: flex; }
  .modal-box { background: white; border-radius: 16px; padding: 26px 26px 22px; width: 500px; max-width: 90vw; max-height: 90vh; overflow-y: auto; animation: popIn 0.16s ease; }
  @keyframes popIn { from { opacity: 0; transform: scale(0.96); } to { opacity: 1; transform: scale(1); } }
  .modal-title { font-size: 16px; font-weight: 900; margin-bottom: 16px; }
  .modal-lbl { font-size: 11px; font-weight: 700; color: var(--sub); margin-bottom: 5px; margin-top: 13px; text-transform: uppercase; letter-spacing: 0.5px; }
  .modal-inp { width: 100%; font-family: 'Noto Sans KR', sans-serif; font-size: 15px; border: 2px solid var(--border); border-radius: 10px; padding: 11px 14px; background: var(--bg); color: var(--text); outline: none; }
  .modal-inp:focus { border-color: var(--accent); }
  .modal-amount-grid { display: grid; grid-template-columns: repeat(6,1fr); gap: 5px; margin-top: 8px; }
  .modal-counter-row { display: flex; align-items: center; gap: 6px; margin-top: 8px; }
  .modal-btns { display: flex; gap: 8px; margin-top: 20px; }
  .modal-cancel { flex: 1; padding: 12px; border: 2px solid var(--border); border-radius: 10px; background: var(--bg); font-family: 'Noto Sans KR', sans-serif; font-size: 14px; font-weight: 700; cursor: pointer; color: var(--sub); }
  .modal-save { flex: 2; padding: 12px; background: var(--accent); color: white; border: none; border-radius: 10px; font-family: 'Noto Sans KR', sans-serif; font-size: 14px; font-weight: 900; cursor: pointer; }
  .modal-save:hover { background: #235249; }

  ::-webkit-scrollbar { width: 5px; }
  ::-webkit-scrollbar-thumb { background: var(--border); border-radius: 4px; }
</style>
</head>
<body>
<div class="app">

  <!-- 헤더 -->
  <div class="header">
    <h1>축의대 계산기</h1>
    <div class="stats">
      <div class="stat-item" style="min-width:160px;"><span class="stat-label">총 인원</span><span class="stat-value" id="hTotal">0명</span></div>
      <div class="stat-item" style="min-width:220px;"><span class="stat-label">총 축의금</span><span class="stat-value" id="hAmount">0원</span></div>
      <div class="stat-item" id="mealStockItem">
        <span class="stat-label">식권 재고</span>
        <input type="number" id="mealStockInp" placeholder="수량" min="0">
        <button id="mealConfirmBtn">확인</button>
        <span class="stat-value stock-val" id="hMeal" style="display:none">-</span>
        <button id="mealAddBtn" style="display:none">추가</button>
        <input type="number" id="mealAddInp" placeholder="+" min="1" style="display:none">
        <button id="mealAddConfirmBtn" style="display:none">확정</button>
        <button id="mealEditBtn" style="display:none">수정</button>
      </div>
      <div class="stat-item" id="giftStockItem">
        <span class="stat-label">답례품 재고</span>
        <input type="number" id="giftStockInp" placeholder="수량" min="0">
        <button id="giftConfirmBtn">확인</button>
        <span class="stat-value stock-val" id="hGift" style="display:none">-</span>
        <button id="giftAddBtn" style="display:none">추가</button>
        <input type="number" id="giftAddInp" placeholder="+" min="1" style="display:none">
        <button id="giftAddConfirmBtn" style="display:none">확정</button>
        <button id="giftEditBtn" style="display:none">수정</button>
      </div>
    </div>
  </div>

  <div class="body">

    <!-- 왼쪽: 입력 -->
    <div class="panel-left">

      <!-- 이름 -->
      <div>
        <div class="sec-label">이름</div>
        <input type="text" id="nameInp" placeholder="이름을 입력해주세요" style="width:100%;">
      </div>

      <!-- 빠른 금액 -->
      <div>
        <div class="sec-label">빠른 금액 선택</div>
        <div class="amount-grid" id="amountGrid">
          <button class="qbtn" data-val="5">5만</button>
          <button class="qbtn" data-val="10">10만</button>
          <button class="qbtn" data-val="15">15만</button>
          <button class="qbtn" data-val="20">20만</button>
          <button class="qbtn" data-val="30">30만</button>
          <button class="qbtn" data-val="40">40만</button>
          <button class="qbtn" data-val="50">50만</button>
          <button class="qbtn" data-val="60">60만</button>
          <button class="qbtn" data-val="70">70만</button>
          <button class="qbtn" data-val="80">80만</button>
          <button class="qbtn" data-val="90">90만</button>
          <button class="qbtn" data-val="100">100만</button>
        </div>
        <input type="number" id="amountInp" placeholder="금액 직접 입력 (단위 : 만원)" min="0" style="margin-top:8px; width:100%;">
      </div>

      <!-- 식권/답례품 -->
      <div class="counter-section">
        <div class="sec-label">식권 / 답례품</div>
        <div class="counter-row" id="mealRow">
          <span class="counter-lbl">식권</span>
          <button class="cbtn zero-on" data-meal="0">0</button>
          <button class="cbtn" data-meal="1">1</button>
          <button class="cbtn" data-meal="2">2</button>
          <button class="cbtn" data-meal="3">3</button>
          <button class="cbtn" data-meal="4">4</button>
          <button class="cbtn" data-meal="5">5</button>
          <input type="number" class="custom-inp" id="mealCustomInp" placeholder="직접 입력" min="0">
        </div>
        <div class="counter-row" id="giftRow">
          <span class="counter-lbl">답례품</span>
          <button class="cbtn zero-on" data-gift="0">0</button>
          <button class="cbtn" data-gift="1">1</button>
          <button class="cbtn" data-gift="2">2</button>
          <button class="cbtn" data-gift="3">3</button>
          <button class="cbtn" data-gift="4">4</button>
          <button class="cbtn" data-gift="5">5</button>
          <input type="number" class="custom-inp" id="giftCustomInp" placeholder="직접 입력" min="0">
        </div>
        <button class="add-btn" id="addBtn">등록</button>
      </div>
    </div>

    <!-- 오른쪽: 목록 -->
    <div class="panel-right">
      <div class="list-header">
        <span class="list-title">방명록</span>
        <input type="text" class="search-inp" id="searchInp" placeholder="이름 검색 (초성 가능)">
        <div style="flex:1;"></div>
        <button class="excel-btn" id="excelBtn">📥 엑셀 저장</button>
      </div>
      <div class="guest-list" id="guestList">
        <div class="empty-state"><div class="empty-icon">📋</div><div>왼쪽에서 하객을 등록하세요</div></div>
      </div>
    </div>

  </div>
</div>

<!-- 수정 모달 -->
<div class="modal-overlay" id="editModal">
  <div class="modal-box">
    <div class="modal-title">정보 수정</div>
    <div class="modal-lbl">이름</div>
    <input type="text" class="modal-inp" id="editName">
    <div class="modal-lbl">금액 (만원)</div>
    <input type="number" class="modal-inp" id="editAmount">
    <div class="modal-amount-grid" id="editAmountGrid">
      <button class="qbtn" data-val="5">5만</button>
      <button class="qbtn" data-val="10">10만</button>
      <button class="qbtn" data-val="15">15만</button>
      <button class="qbtn" data-val="20">20만</button>
      <button class="qbtn" data-val="30">30만</button>
      <button class="qbtn" data-val="40">40만</button>
      <button class="qbtn" data-val="50">50만</button>
      <button class="qbtn" data-val="60">60만</button>
      <button class="qbtn" data-val="70">70만</button>
      <button class="qbtn" data-val="80">80만</button>
      <button class="qbtn" data-val="90">90만</button>
      <button class="qbtn" data-val="100">100만</button>
    </div>
    <div class="modal-lbl">식권</div>
    <div class="modal-counter-row" id="editMealRow">
      <button class="cbtn zero-on" data-meal="0">0</button>
      <button class="cbtn" data-meal="1">1</button>
      <button class="cbtn" data-meal="2">2</button>
      <button class="cbtn" data-meal="3">3</button>
      <button class="cbtn" data-meal="4">4</button>
      <button class="cbtn" data-meal="5">5</button>
      <input type="number" class="custom-inp" id="editMealCustom" placeholder="직접 입력" min="0">
    </div>
    <div class="modal-lbl">답례품</div>
    <div class="modal-counter-row" id="editGiftRow">
      <button class="cbtn zero-on" data-gift="0">0</button>
      <button class="cbtn" data-gift="1">1</button>
      <button class="cbtn" data-gift="2">2</button>
      <button class="cbtn" data-gift="3">3</button>
      <button class="cbtn" data-gift="4">4</button>
      <button class="cbtn" data-gift="5">5</button>
      <input type="number" class="custom-inp" id="editGiftCustom" placeholder="직접 입력" min="0">
    </div>
    <div class="modal-btns">
      <button class="modal-cancel" id="modalCancelBtn">취소</button>
      <button class="modal-save" id="modalSaveBtn">저장</button>
    </div>
  </div>
</div>

<script>
(function() {
  // ── 상태 ──
  let guests = JSON.parse(localStorage.getItem('chukuidae') || '[]');
  let mealVal = 0, giftVal = 0;
  let stockTotal = { meal: 0, gift: 0 };
  let stockSet   = { meal: false, gift: false };
  let editingId  = null, editMeal = 0, editGift = 0;

  const CHOSUNG = ['ㄱ','ㄲ','ㄴ','ㄷ','ㄸ','ㄹ','ㅁ','ㅂ','ㅃ','ㅅ','ㅆ','ㅇ','ㅈ','ㅉ','ㅊ','ㅋ','ㅌ','ㅍ','ㅎ'];
  function getChosung(str) {
    return str.split('').map(ch => {
      const c = ch.charCodeAt(0) - 0xAC00;
      return (c >= 0 && c <= 11171) ? CHOSUNG[Math.floor(c / 588)] : ch;
    }).join('');
  }
  function matchSearch(name, kw) {
    if (!kw) return true;
    if (name.includes(kw)) return true;
    if ([...kw].every(c => CHOSUNG.includes(c))) return getChosung(name).includes(kw);
    return false;
  }

  function fmt(n) { return n.toLocaleString('ko-KR') + '원'; }
  function save() { localStorage.setItem('chukuidae', JSON.stringify(guests)); }

  function getUsed() {
    return {
      meal: guests.reduce((s,g) => s+(g.meal||0), 0),
      gift: guests.reduce((s,g) => s+(g.gift||0), 0),
    };
  }

  // ── 재고 ──
  function confirmStock(type) {
    const val = parseInt(document.getElementById(type+'StockInp').value) || 0;
    if (val <= 0) { alert('수량을 입력해주세요.'); return; }
    stockTotal[type] = val;
    stockSet[type] = true;
    document.getElementById(type+'StockInp').style.display = 'none';
    document.getElementById(type+'ConfirmBtn').style.display = 'none';
    const hKey = 'h' + type.charAt(0).toUpperCase() + type.slice(1);
    document.getElementById(hKey).style.display = '';
    document.getElementById(type+'AddBtn').style.display = '';
    document.getElementById(type+'EditBtn').style.display = '';
    updateStock();
  }

  function showAddInp(type) {
    document.getElementById(type+'AddInp').style.display = '';
    document.getElementById(type+'AddConfirmBtn').style.display = '';
    document.getElementById(type+'AddBtn').style.display = 'none';
    document.getElementById(type+'EditBtn').style.display = 'none';
    document.getElementById(type+'AddInp').focus();
  }

  function confirmAdd(type) {
    const val = parseInt(document.getElementById(type+'AddInp').value) || 0;
    if (val <= 0) { alert('추가 수량을 입력해주세요.'); return; }
    stockTotal[type] += val;
    document.getElementById(type+'AddInp').value = '';
    document.getElementById(type+'AddInp').style.display = 'none';
    document.getElementById(type+'AddConfirmBtn').style.display = 'none';
    document.getElementById(type+'AddBtn').style.display = '';
    document.getElementById(type+'EditBtn').style.display = '';
    updateStock();
  }

  function editStock(type) {
    // 다시 입력 모드로
    const hKey = 'h' + type.charAt(0).toUpperCase() + type.slice(1);
    document.getElementById(type+'StockInp').value = stockTotal[type];
    document.getElementById(type+'StockInp').style.display = '';
    document.getElementById(type+'ConfirmBtn').style.display = '';
    document.getElementById(hKey).style.display = 'none';
    document.getElementById(type+'AddBtn').style.display = 'none';
    document.getElementById(type+'AddInp').style.display = 'none';
    document.getElementById(type+'AddConfirmBtn').style.display = 'none';
    document.getElementById(type+'EditBtn').style.display = 'none';
    stockSet[type] = false;
    updateStock();
  }

  function updateStock() {
    const used = getUsed();
    ['meal','gift'].forEach(type => {
      const unit = type === 'meal' ? '장' : '개';
      const hId = type === 'meal' ? 'hMeal' : 'hGift';
      const hEl = document.getElementById(hId);
      if (!stockSet[type]) { hEl.textContent = '-'; return; }
      const left = stockTotal[type] - used[type];
      hEl.textContent = left + '/' + stockTotal[type] + unit;
      hEl.style.color = left <= 0 ? '#FFB3A7' : left <= 5 ? '#FFD580' : 'white';
    });
  }

  // ── 금액 버튼 ──
  function setAmountBtns(grid, val) {
    grid.querySelectorAll('.qbtn').forEach(b => {
      b.classList.toggle('on', parseInt(b.dataset.val) === val);
    });
  }

  // ── 식권/답례품 버튼 ──
  function setCBtns(row, val, isMeal) {
    const attr = isMeal ? 'meal' : 'gift';
    row.querySelectorAll('.cbtn').forEach(b => {
      const bval = parseInt(b.dataset[attr]);
      b.className = 'cbtn' + (bval === val ? (val === 0 ? ' zero-on' : ' on') : '');
    });
  }

  // ── 등록 ──
  function addGuest() {
    const name = document.getElementById('nameInp').value.trim();
    const amount = (parseInt(document.getElementById('amountInp').value) || 0) * 10000;
    if (!name) { document.getElementById('nameInp').focus(); return; }
    if (!amount) { document.getElementById('amountInp').focus(); return; }

    const used = getUsed();
    if (stockSet.meal && used.meal + mealVal > stockTotal.meal) {
      alert('식권 재고 부족! 잔여 ' + (stockTotal.meal - used.meal) + '장'); return;
    }
    if (stockSet.gift && used.gift + giftVal > stockTotal.gift) {
      alert('답례품 재고 부족! 잔여 ' + (stockTotal.gift - used.gift) + '개'); return;
    }

    guests.unshift({ id: Date.now(), name, amount, meal: mealVal, gift: giftVal });
    save(); render(); updateStock();

    document.getElementById('nameInp').value = '';
    document.getElementById('amountInp').value = '';
    setAmountBtns(document.getElementById('amountGrid'), -1);
    mealVal = 0; giftVal = 0;
    document.getElementById('mealCustomInp').value = '';
    document.getElementById('giftCustomInp').value = '';
    setCBtns(document.getElementById('mealRow'), 0, true);
    setCBtns(document.getElementById('giftRow'), 0, false);
    document.getElementById('nameInp').focus();
  }

  // ── 수정 모달 열기 ──
  function openEdit(id) {
    const g = guests.find(x => x.id === id);
    if (!g) return;
    editingId = id; editMeal = g.meal || 0; editGift = g.gift || 0;

    document.getElementById('editName').value = g.name;
    document.getElementById('editAmount').value = g.amount / 10000;
    document.getElementById('editMealCustom').value = '';
    document.getElementById('editGiftCustom').value = '';

    setAmountBtns(document.getElementById('editAmountGrid'), g.amount / 10000);
    setCBtns(document.getElementById('editMealRow'), editMeal, true);
    if (editMeal > 5) document.getElementById('editMealCustom').value = editMeal;
    setCBtns(document.getElementById('editGiftRow'), editGift, false);
    if (editGift > 5) document.getElementById('editGiftCustom').value = editGift;

    document.getElementById('editModal').classList.add('open');
  }

  function closeModal() {
    document.getElementById('editModal').classList.remove('open');
    editingId = null;
  }

  function saveEdit() {
    const name = document.getElementById('editName').value.trim();
    const amount = (parseInt(document.getElementById('editAmount').value) || 0) * 10000;
    if (!name || !amount) return;

    const usedWithout = {
      meal: guests.reduce((s,x) => s + (x.id===editingId ? 0 : (x.meal||0)), 0),
      gift: guests.reduce((s,x) => s + (x.id===editingId ? 0 : (x.gift||0)), 0),
    };
    if (stockSet.meal && usedWithout.meal + editMeal > stockTotal.meal) {
      alert('식권 재고 부족!'); return;
    }
    if (stockSet.gift && usedWithout.gift + editGift > stockTotal.gift) {
      alert('답례품 재고 부족!'); return;
    }

    const g = guests.find(x => x.id === editingId);
    if (g) { g.name = name; g.amount = amount; g.meal = editMeal; g.gift = editGift; }
    save(); render(); updateStock(); closeModal();
  }

  // ── 삭제 ──
  function deleteGuest(id) {
    if (!confirm('정말 삭제하시겠습니까?')) return;
    guests = guests.filter(x => x.id !== id);
    save(); render(); updateStock();
  }

  // ── 렌더 ──
  function render() {
    const total = guests.reduce((s,g) => s+g.amount, 0);
    document.getElementById('hTotal').textContent = guests.length + '명';
    document.getElementById('hAmount').textContent = fmt(total);

    const kw = document.getElementById('searchInp').value.trim();
    const list = kw ? guests.filter(g => matchSearch(g.name, kw)) : guests;
    const el = document.getElementById('guestList');

    if (list.length === 0) {
      el.innerHTML = '<div class="empty-state"><div class="empty-icon">📋</div><div>' + (kw ? '검색 결과 없음' : '왼쪽에서 하객을 등록하세요') + '</div></div>';
      return;
    }

    el.innerHTML = list.map((g) => {
      const num = guests.length - guests.indexOf(g);
      return '<div class="guest-card">' +
        '<div class="guest-num">' + num + '</div>' +
        '<div class="guest-info">' +
          '<div class="guest-name">' + g.name + '</div>' +
          '<div class="guest-meta">' +
            '<span class="guest-amount">' + fmt(g.amount) + '</span>' +
            (g.meal > 0 ? '<span class="badge badge-meal">식권 ' + g.meal + '장</span>' : '<span class="badge badge-meal-none">식권 없음</span>') +
            (g.gift > 0 ? '<span class="badge badge-gift">답례품 ' + g.gift + '개</span>' : '') +
          '</div>' +
        '</div>' +
        '<div class="card-btns">' +
          '<button class="icon-btn edit-btn" data-id="' + g.id + '">✏️</button>' +
          '<button class="icon-btn del-btn" data-id="' + g.id + '">✕</button>' +
        '</div>' +
      '</div>';
    }).join('');
  }

  // ── 엑셀 ──
  function exportExcel() {
    if (!guests.length) { alert('데이터가 없어요.'); return; }
    const rows = [
      ['번호','이름','축의금','식권(장)','답례품(개)'],
      ...guests.slice().reverse().map((g,i) => [i+1, g.name, g.amount, g.meal||0, g.gift||0]),
      [],
      ['합계','', guests.reduce((s,g)=>s+g.amount,0), guests.reduce((s,g)=>s+(g.meal||0),0), guests.reduce((s,g)=>s+(g.gift||0),0)]
    ];
    const csv = rows.map(r => r.map(c => '"'+c+'"').join(',')).join('\n');
    const a = document.createElement('a');
    a.href = URL.createObjectURL(new Blob(['\uFEFF'+csv], {type:'text/csv;charset=utf-8;'}));
    a.download = '축의대_' + new Date().toLocaleDateString('ko-KR').replace(/\s/g,'') + '.csv';
    a.click();
  }

  // ── 이벤트 바인딩 ──
  window.addEventListener('DOMContentLoaded', function() {

    // 재고 버튼
    document.getElementById('mealConfirmBtn').addEventListener('click', () => confirmStock('meal'));
    document.getElementById('mealAddBtn').addEventListener('click', () => showAddInp('meal'));
    document.getElementById('mealAddConfirmBtn').addEventListener('click', () => confirmAdd('meal'));
    document.getElementById('mealEditBtn').addEventListener('click', () => editStock('meal'));
    document.getElementById('giftConfirmBtn').addEventListener('click', () => confirmStock('gift'));
    document.getElementById('giftAddBtn').addEventListener('click', () => showAddInp('gift'));
    document.getElementById('giftAddConfirmBtn').addEventListener('click', () => confirmAdd('gift'));
    document.getElementById('giftEditBtn').addEventListener('click', () => editStock('gift'));

    // 금액 그리드
    document.getElementById('amountGrid').addEventListener('click', function(e) {
      const btn = e.target.closest('.qbtn');
      if (!btn) return;
      const val = parseInt(btn.dataset.val);
      document.getElementById('amountInp').value = val;
      setAmountBtns(document.getElementById('amountGrid'), val);
    });

    // 식권 행
    document.getElementById('mealRow').addEventListener('click', function(e) {
      const btn = e.target.closest('[data-meal]');
      if (!btn) return;
      mealVal = parseInt(btn.dataset.meal);
      document.getElementById('mealCustomInp').value = '';
      setCBtns(document.getElementById('mealRow'), mealVal, true);
    });
    document.getElementById('mealCustomInp').addEventListener('input', function() {
      mealVal = parseInt(this.value) || 0;
      setCBtns(document.getElementById('mealRow'), -1, true);
    });

    // 답례품 행
    document.getElementById('giftRow').addEventListener('click', function(e) {
      const btn = e.target.closest('[data-gift]');
      if (!btn) return;
      giftVal = parseInt(btn.dataset.gift);
      document.getElementById('giftCustomInp').value = '';
      setCBtns(document.getElementById('giftRow'), giftVal, false);
    });
    document.getElementById('giftCustomInp').addEventListener('input', function() {
      giftVal = parseInt(this.value) || 0;
      setCBtns(document.getElementById('giftRow'), -1, false);
    });

    // 등록
    document.getElementById('addBtn').addEventListener('click', addGuest);
    document.getElementById('nameInp').addEventListener('keydown', e => { if(e.key==='Enter') document.getElementById('amountInp').focus(); });
    document.getElementById('amountInp').addEventListener('keydown', e => { if(e.key==='Enter') addGuest(); });

    // 검색
    document.getElementById('searchInp').addEventListener('input', render);

    // 엑셀
    document.getElementById('excelBtn').addEventListener('click', exportExcel);

    // 목록 이벤트 위임
    document.getElementById('guestList').addEventListener('click', function(e) {
      const editBtn = e.target.closest('.edit-btn');
      const delBtn  = e.target.closest('.del-btn');
      if (editBtn) openEdit(parseInt(editBtn.dataset.id));
      if (delBtn)  deleteGuest(parseInt(delBtn.dataset.id));
    });

    // 모달
    document.getElementById('modalCancelBtn').addEventListener('click', closeModal);
    document.getElementById('modalSaveBtn').addEventListener('click', saveEdit);
    document.getElementById('editModal').addEventListener('click', function(e) {
      if (e.target === this) closeModal();
    });

    // 모달 금액
    document.getElementById('editAmountGrid').addEventListener('click', function(e) {
      const btn = e.target.closest('.qbtn');
      if (!btn) return;
      const val = parseInt(btn.dataset.val);
      document.getElementById('editAmount').value = val;
      setAmountBtns(document.getElementById('editAmountGrid'), val);
    });

    // 모달 식권
    document.getElementById('editMealRow').addEventListener('click', function(e) {
      const btn = e.target.closest('[data-meal]');
      if (!btn) return;
      editMeal = parseInt(btn.dataset.meal);
      document.getElementById('editMealCustom').value = '';
      setCBtns(document.getElementById('editMealRow'), editMeal, true);
    });
    document.getElementById('editMealCustom').addEventListener('input', function() {
      editMeal = parseInt(this.value) || 0;
      setCBtns(document.getElementById('editMealRow'), -1, true);
    });

    // 모달 답례품
    document.getElementById('editGiftRow').addEventListener('click', function(e) {
      const btn = e.target.closest('[data-gift]');
      if (!btn) return;
      editGift = parseInt(btn.dataset.gift);
      document.getElementById('editGiftCustom').value = '';
      setCBtns(document.getElementById('editGiftRow'), editGift, false);
    });
    document.getElementById('editGiftCustom').addEventListener('input', function() {
      editGift = parseInt(this.value) || 0;
      setCBtns(document.getElementById('editGiftRow'), -1, false);
    });

    render();
    updateStock();
  });
})();
</script>
</body>
</html>
